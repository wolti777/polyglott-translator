{% extends "base.html" %}

{% block title %}Glossarium{% endblock %}

{% block content %}
<div class="app-container">
    <header class="app-header-bar">
        <div class="header-left">
            <a href="/translator"><img src="/static/logo.png" alt="Glossarium" class="header-logo"></a>
        </div>
        <div class="header-right">
            <div class="glossary-wrapper">
                <button class="glossary-selector-btn" id="glossary-menu-btn">
                    <span id="selected-glossary-name">—</span>
                    <span class="dropdown-arrow">▼</span>
                </button>
                <div class="glossary-menu" id="glossary-dropdown">
                    <div class="glossary-menu-header" data-i18n="translator.glossary.select">Glossar auswählen</div>
                    <div id="glossary-options"></div>
                </div>
            </div>
            <a href="/translator" class="settings-icon-btn" title="Einstellungen">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </a>
        </div>
    </header>

    <nav class="app-tab-bar">
        <a href="/translator" class="tab-link" data-i18n="nav.glossary">Glossar</a>
        <a href="/glossary-list" class="tab-link active" data-i18n="nav.list">Liste</a>
        <a href="/vocab-test" class="tab-link" data-i18n="nav.test">Test</a>
        <a href="#" id="export-glossary-btn" class="tab-link" data-i18n="nav.export">Export</a>
    </nav>

    <main class="translator-main">
        <div class="list-header">
            <span id="entry-count" class="list-count"></span>
        </div>

        <div id="entries-container" class="entries-list">
            <div class="entries-loading" data-i18n="glossary_list.loading">Laden...</div>
        </div>

        <div id="entries-empty" class="entries-empty" style="display:none;" data-i18n="glossary_list.empty">
            Keine Eintr&auml;ge vorhanden.
        </div>

        <footer class="app-footer">
            <a href="/logout" class="logout-link" data-i18n="nav.logout">Logout</a>
        </footer>
    </main>
</div>
{% endblock %}

{% block scripts %}
<script>
    const currentUsername = '{{ user.username }}';
    const storageKey = (key) => key + '_' + currentUsername;

    const allLanguages = {
        'german': { name: 'Deutsch', flag: '\u{1F1E9}\u{1F1EA}' },
        'english': { name: 'English', flag: '\u{1F1EC}\u{1F1E7}' },
        'spanish': { name: 'Espa\u00f1ol', flag: '\u{1F1EA}\u{1F1F8}' },
        'polish': { name: 'Polski', flag: '\u{1F1F5}\u{1F1F1}' },
        'french': { name: 'Fran\u00e7ais', flag: '\u{1F1EB}\u{1F1F7}' },
        'italian': { name: 'Italiano', flag: '\u{1F1EE}\u{1F1F9}' },
        'portuguese': { name: 'Portugu\u00eas', flag: '\u{1F1F5}\u{1F1F9}' },
        'dutch': { name: 'Nederlands', flag: '\u{1F1F3}\u{1F1F1}' },
        'russian': { name: '\u0420\u0443\u0441\u0441\u043A\u0438\u0439', flag: '\u{1F1F7}\u{1F1FA}' },
    };

    function loadSettings() {
        const saved = localStorage.getItem(storageKey('glossariumSettings'));
        if (saved) {
            try { return JSON.parse(saved); } catch (e) {}
        }
        return { languages: [] };
    }

    const appSettings = loadSettings();
    const entriesContainer = document.getElementById('entries-container');
    const entriesEmpty = document.getElementById('entries-empty');
    const entryCount = document.getElementById('entry-count');
    const glossaryMenuBtn = document.getElementById('glossary-menu-btn');
    const glossaryDropdown = document.getElementById('glossary-dropdown');
    const selectedGlossaryNameEl = document.getElementById('selected-glossary-name');
    const glossaryOptions = document.getElementById('glossary-options');

    let glossaries = [];
    let selectedGlossaryId = localStorage.getItem(storageKey('selectedGlossaryId')) || null;
    let openSwipeCard = null;

    glossaryMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        glossaryDropdown.classList.toggle('show');
    });
    document.addEventListener('click', () => glossaryDropdown.classList.remove('show'));

    async function loadGlossaries() {
        try {
            const response = await fetch('/glossaries');
            if (!response.ok) return;
            glossaries = await response.json();
            glossaryOptions.innerHTML = '';
            glossaries.forEach(g => {
                const div = document.createElement('div');
                div.className = 'glossary-option' + (g.id == selectedGlossaryId ? ' selected' : '');
                div.textContent = g.name;
                div.addEventListener('click', () => {
                    selectedGlossaryId = g.id;
                    localStorage.setItem(storageKey('selectedGlossaryId'), selectedGlossaryId);
                    selectedGlossaryNameEl.textContent = g.name;
                    glossaryDropdown.classList.remove('show');
                    glossaryOptions.querySelectorAll('.glossary-option').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    loadEntries(selectedGlossaryId);
                });
                glossaryOptions.appendChild(div);
            });
            if (!selectedGlossaryId && glossaries.length > 0) {
                const def = glossaries.find(g => g.is_default) || glossaries[0];
                selectedGlossaryId = def.id;
            }
            const active = glossaries.find(g => g.id == selectedGlossaryId);
            if (active) selectedGlossaryNameEl.textContent = active.name;
        } catch (e) {
            console.error('Error loading glossaries:', e);
        }
    }

    async function loadEntries(glossaryId) {
        entriesContainer.innerHTML = '<div class="entries-loading">' + t('glossary_list.loading') + '</div>';
        entriesEmpty.style.display = 'none';
        entryCount.textContent = '';
        try {
            const params = glossaryId ? '?glossary_id=' + glossaryId : '';
            const response = await fetch('/glossary/entries' + params);
            if (!response.ok) throw new Error('Fetch failed');
            const entries = await response.json();
            renderEntries(entries);
        } catch (e) {
            console.error('Error loading entries:', e);
            entriesContainer.innerHTML = '<div class="entries-loading">' + t('glossary_list.error') + '</div>';
        }
    }

    function renderEntries(entries) {
        entriesContainer.innerHTML = '';
        if (entries.length === 0) {
            entriesEmpty.style.display = 'block';
            entryCount.textContent = '0';
            return;
        }
        entriesEmpty.style.display = 'none';
        entryCount.textContent = entries.length;

        entries.forEach(entry => {
            const wrapper = document.createElement('div');
            wrapper.className = 'entry-card-wrapper';
            wrapper.dataset.id = entry.id;

            const langs = appSettings.languages.length > 0 ? appSettings.languages : ['german', 'english', 'spanish', 'polish'];
            let langsHtml = '';
            langs.forEach(lang => {
                const val = entry[lang];
                const langData = allLanguages[lang];
                if (val && langData) {
                    langsHtml += '<span class="entry-lang">' +
                        '<span class="entry-flag">' + langData.flag + '</span>' +
                        '<span class="entry-text">' + escapeHtml(val) + '</span>' +
                    '</span>';
                }
            });

            const rate = entry.total_learning_rate || 0;

            wrapper.innerHTML =
                '<div class="entry-card">' +
                    '<div class="entry-card-body">' + langsHtml + '</div>' +
                    '<div class="entry-card-actions">' +
                        '<span class="entry-rate">' + rate + '</span>' +
                        '<button class="entry-delete" aria-label="' + t('glossary_list.delete') + '">&times;</button>' +
                    '</div>' +
                '</div>' +
                '<div class="swipe-actions">' +
                    '<div class="swipe-edit">' + t('glossary_list.edit') + '</div>' +
                    '<div class="swipe-delete">' + t('glossary_list.delete') + '</div>' +
                '</div>';

            wrapper.querySelector('.entry-delete').addEventListener('click', (e) => {
                e.stopPropagation();
                deleteEntry(entry.id, wrapper);
            });

            wrapper.querySelector('.swipe-delete').addEventListener('click', () => {
                deleteEntry(entry.id, wrapper);
            });

            wrapper.querySelector('.swipe-edit').addEventListener('click', () => {
                editEntry(entry, wrapper);
            });

            setupSwipe(wrapper);
            entriesContainer.appendChild(wrapper);
        });
    }

    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    async function deleteEntry(id, wrapper) {
        try {
            const response = await fetch('/glossary/entry/' + id, { method: 'DELETE' });
            if (response.ok) {
                wrapper.style.transition = 'opacity 0.2s ease, max-height 0.3s ease';
                wrapper.style.opacity = '0';
                wrapper.style.maxHeight = wrapper.offsetHeight + 'px';
                requestAnimationFrame(() => {
                    wrapper.style.maxHeight = '0';
                    wrapper.style.marginBottom = '0';
                    wrapper.style.overflow = 'hidden';
                });
                setTimeout(() => {
                    wrapper.remove();
                    const remaining = entriesContainer.children.length;
                    entryCount.textContent = remaining;
                    if (remaining === 0) entriesEmpty.style.display = 'block';
                }, 300);
                loadGlossaries();
            }
        } catch (e) {
            console.error('Error deleting entry:', e);
        }
    }

    async function editEntry(entry, wrapper) {
        // Determine source language (first non-empty language in user's settings)
        const langs = appSettings.languages.length > 0 ? appSettings.languages : ['german', 'english'];
        const sourceLang = langs.find(l => entry[l]) || langs[0];
        const sourceWord = entry[sourceLang] || '';

        try {
            await fetch('/glossary/entry/' + entry.id, { method: 'DELETE' });
        } catch (e) {
            console.error('Error deleting entry for edit:', e);
        }

        const pendingKey = storageKey('pendingEdit');
        localStorage.setItem(pendingKey, JSON.stringify({ word: sourceWord, lang: sourceLang }));
        window.location.href = '/translator';
    }

    function setupSwipe(wrapper) {
        const card = wrapper.querySelector('.entry-card');
        const actions = wrapper.querySelector('.swipe-actions');
        let startX = 0, currentX = 0, isDragging = false;

        card.addEventListener('touchstart', (e) => {
            if (openSwipeCard && openSwipeCard !== wrapper) resetSwipe(openSwipeCard);
            startX = e.touches[0].clientX;
            currentX = 0;
            isDragging = true;
            card.style.transition = 'none';
            if (actions) actions.style.transition = 'none';
        }, { passive: true });

        card.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX - startX;
            if (currentX > 0) currentX = 0;
            if (currentX < -180) currentX = -180;
            card.style.transform = 'translateX(' + currentX + 'px)';
            // actions slides in from the right: offset starts at 160 (hidden) → 0 (fully visible)
            if (actions) actions.style.transform = 'translateX(' + (160 + currentX) + 'px)';
        }, { passive: true });

        card.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            card.style.transition = 'transform 0.2s ease';
            if (actions) actions.style.transition = 'transform 0.2s ease';
            if (currentX < -50) {
                card.style.transform = 'translateX(-160px)';
                if (actions) actions.style.transform = 'translateX(0)';
                openSwipeCard = wrapper;
            } else {
                card.style.transform = 'translateX(0)';
                if (actions) actions.style.transform = 'translateX(160px)';
                if (openSwipeCard === wrapper) openSwipeCard = null;
            }
        });
    }

    function resetSwipe(wrapper) {
        const card = wrapper.querySelector('.entry-card');
        const actions = wrapper.querySelector('.swipe-actions');
        if (card) {
            card.style.transition = 'transform 0.2s ease';
            card.style.transform = 'translateX(0)';
        }
        if (actions) {
            actions.style.transition = 'transform 0.2s ease';
            actions.style.transform = 'translateX(160px)';
        }
        if (openSwipeCard === wrapper) openSwipeCard = null;
    }

    document.addEventListener('touchstart', (e) => {
        if (openSwipeCard && !openSwipeCard.contains(e.target)) resetSwipe(openSwipeCard);
    }, { passive: true });

    document.getElementById('export-glossary-btn').addEventListener('click', (e) => {
        e.preventDefault();
        const url = selectedGlossaryId ? `/glossary/export?glossary_id=${selectedGlossaryId}` : '/glossary/export';
        window.location.href = url;
    });

    loadGlossaries().then(() => loadEntries(selectedGlossaryId));
</script>
{% endblock %}
