{% extends "base.html" %}

{% block title %}Register - Polyglot Translator{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 0.5rem;">
            <img src="/static/logo.png" alt="Glossarium" style="width: 64px; height: 64px;">
        </div>
        <h1 class="auth-title">Glossarium</h1>
        <h2 data-i18n="auth.register.title">Register</h2>

        {% if error_key %}
        <div class="error-message" data-i18n="{{ error_key }}"></div>
        {% endif %}

        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="username" data-i18n="auth.register.username">Username</label>
                <input type="text" id="username" name="username" required autofocus minlength="3" maxlength="50">
            </div>
            <div class="form-group">
                <label for="email" data-i18n="auth.register.email">E-Mail</label>
                <input type="email" id="email" name="email" required data-i18n-placeholder="auth.register.email_placeholder">
            </div>
            <div class="form-group">
                <label for="password" data-i18n="auth.register.password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="password_confirm" data-i18n="auth.register.password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="auth.register.btn">Register</button>
        </form>

        <p class="auth-link">
            <span data-i18n="auth.register.have_account">Already have an account?</span> <a href="/login" data-i18n="auth.register.login_here">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
