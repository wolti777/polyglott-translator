{% extends "base.html" %}

{% block title %}Passwort ändern - Glossarium{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Polyglot Translator</h1>
        <h2 data-i18n="auth.change.title">Passwort ändern</h2>

        {% if error_key %}
        <div class="error-message" data-i18n="{{ error_key }}"></div>
        {% endif %}

        {% if success_key %}
        <div class="success-message" data-i18n="{{ success_key }}"></div>
        {% endif %}

        <form method="POST" action="/change-password" class="auth-form">
            <div class="form-group">
                <label for="current_password" data-i18n="auth.change.current_password">Aktuelles Passwort</label>
                <input type="password" id="current_password" name="current_password" required>
            </div>
            <div class="form-group">
                <label for="new_password" data-i18n="auth.change.new_password">Neues Passwort</label>
                <input type="password" id="new_password" name="new_password" required minlength="6">
            </div>
            <div class="form-group">
                <label for="new_password_confirm" data-i18n="auth.change.new_password_confirm">Neues Passwort bestätigen</label>
                <input type="password" id="new_password_confirm" name="new_password_confirm" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="auth.change.btn">Passwort ändern</button>
        </form>

        <p class="auth-link">
            <a href="/translator" data-i18n="auth.change.back">Zurück zum Übersetzer</a>
        </p>
    </div>
</div>
{% endblock %}
