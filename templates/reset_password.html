{% extends "base.html" %}

{% block title %}Passwort zurücksetzen - Glossarium{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">Polyglot Translator</h1>
        <h2 data-i18n="auth.reset.title">Neues Passwort setzen</h2>

        {% if error_key %}
        <div class="error-message" data-i18n="{{ error_key }}"></div>
        {% endif %}

        <form method="POST" action="/reset-password" class="auth-form">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group">
                <label for="new_password" data-i18n="auth.reset.new_password">Neues Passwort</label>
                <input type="password" id="new_password" name="new_password" required minlength="6" autofocus>
            </div>
            <div class="form-group">
                <label for="new_password_confirm" data-i18n="auth.reset.new_password_confirm">Passwort bestätigen</label>
                <input type="password" id="new_password_confirm" name="new_password_confirm" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" data-i18n="auth.reset.btn">Passwort speichern</button>
        </form>

        <p class="auth-link">
            <a href="/login" data-i18n="auth.reset.back_login">Zurück zum Login</a>
        </p>
    </div>
</div>
{% endblock %}
